<svg xmlns="http://www.w3.org/2000/svg" width="60" height="52" viewBox="0 0 60 52">
  <!--
    Petek (honeycomb) doku — 60×52 tile.
    Primeeva-tarzı premium 3D havuzlu paspas zemini.
    Hexagonal tessellation, 3D derinlik için inner shadow + highlight.
  -->
  <defs>
    <linearGradient id="hex-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)" />
    </linearGradient>

    <!-- Hücre içi 3D çukur efekti -->
    <radialGradient id="hex-depth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.25)" />
      <stop offset="60%" stop-color="rgba(0,0,0,0.05)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.08)" />
    </radialGradient>
  </defs>

  <!-- Taban (transparent — renk overlay dolduracak) -->
  <rect width="60" height="52" fill="transparent" />

  <!-- 3 hexagon: tile düzeninde repeating -->
  <!-- Üst sol hexagon -->
  <polygon points="15,2 28,9.5 28,24.5 15,32 2,24.5 2,9.5" fill="url(#hex-depth)" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
  <polygon points="15,2 28,9.5 28,24.5 15,32 2,24.5 2,9.5" fill="url(#hex-fill)" opacity="0.7"/>

  <!-- Üst sağ hexagon -->
  <polygon points="45,2 58,9.5 58,24.5 45,32 32,24.5 32,9.5" fill="url(#hex-depth)" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
  <polygon points="45,2 58,9.5 58,24.5 45,32 32,24.5 32,9.5" fill="url(#hex-fill)" opacity="0.7"/>

  <!-- Alt orta hexagon (offset row) -->
  <polygon points="30,21 43,28.5 43,43.5 30,51 17,43.5 17,28.5" fill="url(#hex-depth)" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
  <polygon points="30,21 43,28.5 43,43.5 30,51 17,43.5 17,28.5" fill="url(#hex-fill)" opacity="0.7"/>

  <!-- Highlight kenarlar (üst dudak hafif yansıma) -->
  <g stroke="rgba(255,255,255,0.18)" stroke-width="0.4" fill="none">
    <line x1="2" y1="9.5" x2="15" y2="2" />
    <line x1="32" y1="9.5" x2="45" y2="2" />
    <line x1="17" y1="28.5" x2="30" y2="21" />
  </g>
</svg>
