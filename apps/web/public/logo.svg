<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5A75A"/>
      <stop offset="50%" stop-color="#D4923A"/>
      <stop offset="100%" stop-color="#A8702A"/>
    </linearGradient>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A6BB0"/>
      <stop offset="100%" stop-color="#1F3F70"/>
    </linearGradient>
    <linearGradient id="taupe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#8E7E60"/>
    </linearGradient>
    <linearGradient id="matBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a20"/>
      <stop offset="100%" stop-color="#0b0b0f"/>
    </linearGradient>
  </defs>

  <!-- Üst yay (araç silüeti) - altın -->
  <path
    d="M 90 175
       C 95 130, 130 95, 200 95
       C 270 95, 305 130, 320 175
       L 340 195
       C 350 175, 355 145, 350 115
       C 340 70, 290 40, 200 35
       C 110 40, 60 70, 50 115
       C 45 145, 50 175, 60 195
       Z"
    fill="url(#gold)"
    transform="translate(0,30) scale(1,0.8)"
  />

  <!-- Araç gövde alt çizgisi - altın ince -->
  <path
    d="M 60 215 Q 200 235 340 215"
    stroke="url(#gold)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Alt yay - lacivert -->
  <path
    d="M 50 240
       Q 70 340, 200 360
       Q 330 340, 350 240"
    stroke="url(#navy)"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- 3 paspas — sol altın, orta taupe, sağ lacivert -->
  <!-- Sol paspas (altın) -->
  <g transform="translate(110,200) rotate(-8)">
    <rect x="0" y="0" width="70" height="100" rx="6" fill="url(#gold)"/>
    <rect x="6" y="6" width="58" height="88" rx="3" fill="url(#matBg)"/>
    <!-- Doku çizgileri -->
    <path d="M 35 20 Q 20 50, 35 80" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.4" fill="none"/>
    <path d="M 35 25 Q 28 50, 35 75" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.3" fill="none"/>
    <path d="M 35 30 Q 42 50, 35 70" stroke="url(#gold)" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  </g>

  <!-- Orta paspas (taupe) -->
  <g transform="translate(170,210)">
    <rect x="0" y="0" width="70" height="100" rx="6" fill="url(#taupe)"/>
    <rect x="6" y="6" width="58" height="88" rx="3" fill="url(#matBg)"/>
    <path d="M 35 20 Q 20 50, 35 80" stroke="url(#taupe)" stroke-width="1" stroke-opacity="0.4" fill="none"/>
    <path d="M 35 25 Q 28 50, 35 75" stroke="url(#taupe)" stroke-width="1" stroke-opacity="0.3" fill="none"/>
    <path d="M 35 30 Q 42 50, 35 70" stroke="url(#taupe)" stroke-width="1" stroke-opacity="0.4" fill="none"/>
  </g>

  <!-- Sağ paspas (lacivert) -->
  <g transform="translate(225,200) rotate(8)">
    <rect x="0" y="0" width="70" height="100" rx="6" fill="url(#navy)"/>
    <rect x="6" y="6" width="58" height="88" rx="3" fill="url(#matBg)"/>
    <path d="M 35 20 Q 20 50, 35 80" stroke="url(#navy)" stroke-width="1" stroke-opacity="0.5" fill="none"/>
    <path d="M 35 25 Q 28 50, 35 75" stroke="url(#navy)" stroke-width="1" stroke-opacity="0.4" fill="none"/>
    <path d="M 35 30 Q 42 50, 35 70" stroke="url(#navy)" stroke-width="1" stroke-opacity="0.5" fill="none"/>
  </g>
</svg>
