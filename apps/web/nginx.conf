server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/wasm
    image/svg+xml
    font/woff2;

  # Static assets — long cache + immutable
  location ~* \.(?:webp|avif|jpg|jpeg|png|svg|ico|woff2|woff|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # CSS/JS hashed by Astro — long cache
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Service Worker — must not be cached aggressively
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=300";
    add_header Content-Type "application/manifest+json";
    try_files $uri =404;
  }

  # Health check
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # SPA-ish fallback for unmatched routes — serve index.html
  # (Astro static build creates per-route index.html so this is mostly a safety net)
  location / {
    try_files $uri $uri/ $uri.html $uri/index.html /index.html;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
